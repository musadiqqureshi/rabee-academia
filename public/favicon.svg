<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="180" height="180" rx="38" fill="url(#bg)"/>
  <rect width="180" height="180" rx="38" fill="url(#shine)"/>

  <!-- Atom nucleus -->
  <circle cx="90" cy="90" r="11" fill="white" opacity="0.95"/>

  <!-- Orbit 1: horizontal ellipse -->
  <ellipse cx="90" cy="90" rx="52" ry="18" stroke="white" stroke-width="5.5" fill="none" opacity="0.9"/>

  <!-- Orbit 2: rotated 60° -->
  <ellipse cx="90" cy="90" rx="52" ry="18" stroke="white" stroke-width="5.5" fill="none" opacity="0.9"
    transform="rotate(60 90 90)"/>

  <!-- Orbit 3: rotated 120° -->
  <ellipse cx="90" cy="90" rx="52" ry="18" stroke="white" stroke-width="5.5" fill="none" opacity="0.9"
    transform="rotate(120 90 90)"/>
</svg>
