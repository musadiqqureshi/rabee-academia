<svg viewBox="0 0 1600 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.55" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <radialGradient id="glow1" cx="78%" cy="28%" r="40%">
      <stop offset="0" stop-color="#a7f3d0" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#a7f3d0" stop-opacity="0"/>
    </radialGradient>
    <pattern id="stars1" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M60 12 L66 36 L90 30 L72 48 L84 72 L60 60 L36 72 L48 48 L30 30 L54 36 Z" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1600" height="700" fill="url(#sky1)"/>
  <rect width="1600" height="700" fill="url(#stars1)"/>
  <rect width="1600" height="700" fill="url(#glow1)"/>
  <!-- crescent moon -->
  <g transform="translate(1230,150)">
    <circle r="70" fill="#fef9c3" opacity="0.95"/>
    <circle r="70" cx="36" cy="-18" fill="#0d9488"/>
  </g>
  <!-- scattered stars -->
  <g fill="#fef9c3" opacity="0.9">
    <circle cx="1120" cy="110" r="4"/><circle cx="1360" cy="230" r="3"/><circle cx="1040" cy="220" r="3"/>
    <circle cx="980" cy="120" r="2.5"/><circle cx="1300" cy="90" r="2.5"/>
  </g>
  <!-- mosque silhouette -->
  <g fill="#064e3b" opacity="0.92">
    <rect x="0" y="540" width="1600" height="160"/>
    <!-- left minaret -->
    <rect x="170" y="300" width="34" height="260"/>
    <path d="M187 270 a17 30 0 0 1 17 30 h-34 a17 30 0 0 1 17 -30 z"/>
    <circle cx="187" cy="262" r="10"/>
    <!-- main dome -->
    <path d="M760 560 V430 a140 140 0 0 1 280 0 V560 Z"/>
    <path d="M900 250 a14 40 0 0 1 14 40 h-28 a14 40 0 0 1 14 -40 z"/>
    <circle cx="900" cy="244" r="11"/>
    <!-- side domes -->
    <path d="M620 560 V470 a80 80 0 0 1 160 0 V560 Z"/>
    <path d="M1020 560 V470 a80 80 0 0 1 160 0 V560 Z"/>
    <!-- right minaret -->
    <rect x="1396" y="320" width="34" height="240"/>
    <path d="M1413 290 a17 30 0 0 1 17 30 h-34 a17 30 0 0 1 17 -30 z"/>
    <circle cx="1413" cy="282" r="10"/>
    <!-- arched windows -->
    <g fill="#0d9488" opacity="0.5">
      <path d="M870 560 V500 a30 30 0 0 1 60 0 V560 Z"/>
      <path d="M670 560 V520 a20 20 0 0 1 40 0 V560 Z"/>
      <path d="M1090 560 V520 a20 20 0 0 1 40 0 V560 Z"/>
    </g>
  </g>
</svg>
